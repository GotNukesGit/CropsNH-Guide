[build]
  publish = "."

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/calc"
  to = "/calculator.html"
  status = 200

[[redirects]]
  from = "/prod"
  to = "/production.html"
  status = 200

[[redirects]]
  from = "/guide"
  to = "/guide.html"
  status = 200
